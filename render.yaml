services:
  - type: web
    name: lgsvcblog
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lgblog-db
          property: connectionString

databases:
  - name: lgblog-db
    plan: free
    region: singapore
    databaseName: lgblog
    user: lgblog
